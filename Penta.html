<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PentatlónPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.2s; }
        #loadingOverlay { background: #020617; display: flex; align-items: center; justify-content: center; z-index: 100; position: fixed; inset: 0; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .accordion-open { max-height: 2000px; }
    </style>
</head>
<body class="p-2 md:p-8">
    
    <div class="flex justify-between items-center mb-4">
        <button onclick="logoutSession()" class="px-6 py-2 bg-red-600/20 border border-red-500/50 text-red-500 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs uppercase tracking-widest transition-all">
            Cerrar Sesión
        </button>
        <div id="adminBadge" class="hidden bg-blue-600/20 border border-blue-500/50 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">Modo Admin</div>
    </div>

    <div id="loadingOverlay"><div class="text-center"><div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div><p class="neon-blue font-bold uppercase text-sm">Cargando...</p></div></div>

    <div id="app" class="max-w-7xl mx-auto opacity-0 transition-opacity duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-6 gap-4">
            <div class="flex items-center gap-4">
                <img src="/deeee.jpeg" alt="Logo" class="h-20 w-auto rounded-lg shadow-lg object-contain">
                <div>
                    <h1 class="text-2xl font-black italic text-white uppercase">Penta Elite</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase">Sistema de Resultados</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-purple-900/40 text-purple-400 border border-purple-800/50 px-6 py-2 rounded-xl text-xs font-black uppercase">Eventos</button>
                <button onclick="showDisciplinesView()" class="btn-orange text-white px-6 py-2 rounded-xl text-xs font-black uppercase">Disciplinas</button>
                <button id="adminToggleBtn" onclick="toggleAdminMode()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-black uppercase border border-slate-700">Admin</button>
            </div>
        </header>

        <div id="disciplinesView" class="hidden mb-6">
            <h2 class="text-orange-500 font-black uppercase mb-4 text-sm">Registros de Disciplinas</h2>
            <div class="card rounded-2xl overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-800 uppercase font-black text-slate-400">
                        <tr><th class="p-4">Atleta</th><th class="p-4">Estado/Club</th><th class="p-4">Disciplina</th><th class="p-4">Tiempo</th></tr>
                    </thead>
                    <tbody id="disciplinesResultsBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="publicEventsView" class="block mb-6">
            <div id="publicEventsList" class="grid grid-cols-1 gap-4 mb-6"></div>
        </div>

        <main>
            <div id="resultsContainer" class="hidden space-y-6">
                <div id="navButtonsResults" class="flex flex-wrap gap-2 py-4 border-b border-slate-800">
                    <button onclick="showSubView('ranking')" id="btnRank" class="bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg">Tabla General</button>
                    <button onclick="showSubView('laser')" id="btnLaser" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Solo Laser Run</button>
                </div>
                <div id="rankingSubView" class="subview">
                    <div class="card rounded-2xl overflow-x-auto"><table class="w-full text-left text-xs"><tbody id="scoreboardBody" class="divide-y divide-slate-800"></tbody></table></div>
                </div>
            </div>

            <section id="adminPanel" class="hidden space-y-8 mt-12 border-t-2 border-dashed border-slate-800 pt-12">
                <div class="card p-6 rounded-3xl">
                    <h2 class="text-blue-400 font-black uppercase mb-4 text-sm">Registrar Atleta</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="playerEvent" class="input-dark p-3 rounded-xl text-xs bg-slate-950 col-span-full"></select>
                        <input type="text" id="playerName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Completo">
                        <select id="playerState" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Estado...</option></select>
                        <select id="playerSex" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="M">Masculino</option><option value="F">Femenino</option></select>
                        <input type="text" id="playerObs" class="input-dark p-3 rounded-xl text-xs" placeholder="Obstáculos (seg)">
                        <input type="text" id="playerNat" class="input-dark p-3 rounded-xl text-xs" placeholder="Natación (m:s)">
                        <input type="text" id="playerLas" class="input-dark p-3 rounded-xl text-xs" placeholder="Laser Run (m:s)">
                    </div>
                    <button onclick="savePlayer()" class="btn-primary mt-4 text-white px-10 py-3 rounded-xl font-black uppercase text-xs w-full">Guardar Atleta y Tiempos</button>
                </div>

                <div class="card p-6 rounded-3xl border-2 border-blue-500/30">
                    <h2 class="text-white font-black uppercase mb-6 text-sm">Registrar Disciplina y Tiempos</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="discEvent" class="input-dark p-3 rounded-xl text-xs bg-slate-950 col-span-full"></select>
                        <input type="text" id="discName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Atleta">
                        <select id="discState" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Estado...</option></select>
                        <select id="discClub" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Club...</option></select>
                        <select id="playerDisc" class="input-dark p-3 rounded-xl text-sm bg-blue-950/30 col-span-full font-bold">
                            <option value="Pentatlon Moderno">Pentatlon Moderno</option>
                            <option value="Obstaculos Laser Run">Obstaculos Laser Run</option>
                            <option value="OCR 100">OCR 100</option>
                            <option value="OCR 400">OCR 400</option>
                            <option value="OCR 3 Km +">OCR 3 Km +</option>
                        </select>
                        <input type="text" id="discTime" class="input-dark p-3 rounded-xl text-xs col-span-full" placeholder="Tiempo de la Disciplina (ej. 15:30)">
                    </div>
                    <button onclick="saveDiscData()" class="btn-primary mt-6 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs w-full">Registrar Disciplina</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ", authDomain: "pentatlon-scores.firebaseapp.com", projectId: "pentatlon-scores", storageBucket: "pentatlon-scores.firebasestorage.app", messagingSenderId: "650229123946", appId: "1:650229123946:web:a3769c31f8ce1a23edb313" };
        const appId = 'penta-tourney-v2';
        let firebaseApp, auth, db, players = [], disciplines = [], events = [], isAdmin = false;

        async function start() {
            firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp);
            onAuthStateChanged(auth, (user) => { if (user) setupListeners(); else window.location.href = 'index.html'; });
        }

        function setupListeners() {
            // Escuchar Atletas
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'athletes'), (snap) => {
                players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
            });
            // Escuchar Disciplinas Específicas
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'disciplines_logs'), (snap) => {
                disciplines = snap.docs.map(d => d.data());
                renderDisciplinesTable();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateEventSelects(); renderEventsList();
            });
        }

        window.savePlayer = async () => {
            const data = {
                event: document.getElementById('playerEvent').value, name: document.getElementById('playerName').value,
                state: document.getElementById('playerState').value, sex: document.getElementById('playerSex').value,
                obstaculos: document.getElementById('playerObs').value, natacion: document.getElementById('playerNat').value,
                laser: document.getElementById('playerLas').value, type: 'atleta_base'
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', crypto.randomUUID()), data);
            alert("Atleta Guardado");
        };

        window.saveDiscData = async () => {
            const data = {
                event: document.getElementById('discEvent').value, name: document.getElementById('discName').value,
                state: document.getElementById('discState').value, club: document.getElementById('discClub').value,
                discipline: document.getElementById('playerDisc').value, time: document.getElementById('discTime').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'disciplines_logs', crypto.randomUUID()), data);
            alert("Registro de Disciplina Exitoso");
        };

        window.showDisciplinesView = () => {
            document.getElementById('publicEventsView').classList.add('hidden');
            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('disciplinesView').classList.remove('hidden');
        };

        function renderDisciplinesTable() {
            document.getElementById('disciplinesResultsBody').innerHTML = disciplines.map(d => `
                <tr>
                    <td class="p-4 font-black uppercase text-white">${d.name}</td>
                    <td class="p-4 text-slate-400">${d.state} / ${d.club}</td>
                    <td class="p-4 text-orange-400 font-bold">${d.discipline}</td>
                    <td class="p-4 font-black text-white">${d.time || '--'}</td>
                </tr>
            `).join('');
        }

        window.applyFilters = (eventName, eventId) => {
            const sex = document.getElementById('sex-'+eventId).value;
            document.getElementById('publicEventsView').classList.add('hidden');
            document.getElementById('disciplinesView').classList.add('hidden');
            document.getElementById('resultsContainer').classList.remove('hidden');
            renderRanking(eventName, sex);
        };

        function renderRanking(eventName, sex) {
            let filtered = players.filter(p => p.event === eventName && p.sex === sex);
            document.getElementById('scoreboardBody').innerHTML = filtered.map(p => `
                <tr><td class="p-4 font-black">${p.name}</td><td class="p-4">${p.laser}</td></tr>
            `).join('');
        }

        function updateEventSelects() {
            const opt = events.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            document.getElementById('playerEvent').innerHTML = opt;
            document.getElementById('discEvent').innerHTML = opt;
        }

        function renderEventsList() {
            document.getElementById('publicEventsList').innerHTML = events.map(e => `
                <div class="card rounded-2xl p-6 mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <p class="font-black text-white uppercase">${e.name}</p>
                        <select id="sex-${e.id}" class="input-dark p-2 rounded-lg text-xs"><option value="M">HOMBRE</option><option value="F">MUJER</option></select>
                    </div>
                    <button onclick="applyFilters('${e.name}', '${e.id}')" class="btn-primary w-full py-3 rounded-xl text-xs font-black uppercase">Ver Resultados</button>
                </div>
            `).join('');
        }

        window.toggleAdminMode = () => { isAdmin ? (isAdmin=false, document.getElementById('adminPanel').classList.add('hidden')) : openLoginModal(); };
        window.openLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
        window.checkPassword = () => { if(document.getElementById('adminPass').value === "Newman.999") { isAdmin=true; document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('loginModal').classList.add('hidden'); } };

        start();
    </script>

    <div id="loginModal" class="fixed inset-0 bg-slate-950 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-sm border border-slate-800 text-center">
            <input type="password" id="adminPass" class="input-dark w-full p-4 rounded-2xl mb-6 text-center text-2xl" placeholder="****">
            <button onclick="checkPassword()" class="btn-primary w-full py-4 rounded-2xl font-black text-white text-xs uppercase">Entrar</button>
        </div>
    </div>
</body>
</html>
