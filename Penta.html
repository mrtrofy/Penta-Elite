<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PentatlónPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        #loadingOverlay { background: #020617; display: flex; align-items: center; justify-content: center; z-index: 100; position: fixed; inset: 0; }
        .pts-value { font-size: 0.85rem; font-weight: 800; color: #f1f5f9; }
        .cat-tag { font-size: 0.65rem; background: #1e293b; color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-weight: 700; border: 1px solid #334155; }
        .vs-circle { background: #1e293b; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; border: 1px solid #334155; margin: 10px auto; color: #38bdf8; }
    </style>
</head>
<body class="p-2 md:p-8">
    
    <div class="flex justify-between items-center mb-4">
        <button onclick="window.location.href='index.html'" class="px-6 py-2 bg-red-600/20 border border-red-500/50 text-red-500 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs uppercase tracking-widest transition-all">
            Cerrar Sesión
        </button>
        <div id="adminBadge" class="hidden bg-blue-600/20 border border-blue-500/50 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">Modo Admin</div>
    </div>

    <div id="loadingOverlay"><div class="text-center"><div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div><p class="neon-blue font-bold uppercase text-sm">Cargando...</p></div></div>

    <div id="app" class="max-w-7xl mx-auto opacity-0 transition-opacity duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-6 gap-4">
            <div class="flex items-center gap-4">
                <img src="/deeee.jpeg" alt="Logo" class="h-20 w-auto rounded-lg shadow-lg object-contain">
                <div>
                    <h1 class="text-2xl font-black italic text-white uppercase">Penta Elite</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase">Sistema de Resultados</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="switchView('publicEvents')" class="bg-purple-900/40 text-purple-400 border border-purple-800/50 px-6 py-2 rounded-xl text-xs font-black uppercase">Eventos</button>
                <button id="adminToggleBtn" onclick="toggleAdminMode()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-black uppercase border border-slate-700">Admin</button>
            </div>
        </header>

        <div id="publicEventsView" class="hidden mb-6">
            <div class="card p-6 rounded-3xl border-purple-900/30 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="text-[9px] uppercase font-bold text-slate-500 ml-2">Género</label>
                        <select id="filterSex" class="input-dark w-full p-3 rounded-xl mt-1 text-xs">
                            <option value="M">HOMBRE</option><option value="F">MUJER</option><option value="TODOS">RELEVOS</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-bold text-slate-500 ml-2">Fase</label>
                        <select id="filterPhase" class="input-dark w-full p-3 rounded-xl mt-1 text-xs">
                            <option value="Calificación">CALIFICACIÓN</option><option value="Semifinal">SEMIFINAL</option><option value="Final">FINAL</option>
                        </select>
                    </div>
                    <div class="flex items-end"><button onclick="applyMainFilters()" class="btn-primary w-full p-3 rounded-xl text-xs font-black uppercase">Resultados</button></div>
                </div>
                
                <div id="subViewButtons" class="hidden flex flex-wrap gap-2 pt-4 border-t border-slate-800">
                    <button onclick="switchView('ranking')" id="btnViewRanking" class="bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg">Tabla General</button>
                    <button onclick="switchView('status')" id="btnViewStatus" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Esgrima</button>
                    <button onclick="switchView('tournament')" id="btnViewTournament" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Eliminación</button>
                    <button onclick="switchView('handicap')" id="btnViewHandicap" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Hándicap</button>
                </div>
            </div>
            <div id="publicEventsList" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <main>
            <div id="rankingView" class="hidden">
                <div class="overflow-x-auto card rounded-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-[9px] uppercase font-black text-slate-400">
                            <tr><th class="p-5">Atleta</th><th class="p-5">Obs</th><th class="p-5">Nat</th><th class="p-5">Laser</th><th class="p-5">Total</th><th class="p-5 admin-only hidden text-right">Acciones</th></tr>
                        </thead>
                        <tbody id="scoreboardBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
            <div id="statusView" class="hidden"><div id="statusGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
            <div id="tournamentView" class="hidden"><div id="tournamentBrackets" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
            <div id="handicapView" class="hidden"><div class="card rounded-2xl overflow-hidden"><table class="w-full text-left"><tbody id="handicapBody" class="divide-y divide-slate-800"></tbody></table></div></div>

            <section id="adminPanel" class="hidden space-y-8 mt-12 border-t-2 border-dashed border-slate-800 pt-12">
                <div class="card p-6 rounded-3xl">
                    <h2 class="text-purple-400 font-black uppercase mb-4">Gestión de Eventos</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                        <input type="text" id="eventName" class="input-dark p-3 rounded-xl text-sm" placeholder="Nombre">
                        <input type="date" id="eventDate" class="input-dark p-3 rounded-xl text-sm">
                        <input type="text" id="eventDesc" class="input-dark p-3 rounded-xl text-sm" placeholder="Lugar">
                    </div>
                    <button onclick="saveEvent()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase">Crear Evento</button>
                    <div class="mt-6"><div id="adminEventsList" class="space-y-2"></div></div>
                </div>

                <div class="card p-6 rounded-3xl">
                    <h2 class="text-blue-400 font-black uppercase mb-4">Registro Atleta</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="playerEvent" class="input-dark p-3 rounded-xl text-sm bg-slate-950 col-span-full"></select>
                        <input type="text" id="playerName" class="input-dark p-3 rounded-xl text-sm" placeholder="Nombre">
                        <select id="playerSex" class="input-dark p-3 rounded-xl text-sm bg-slate-950"><option value="M">Masculino</option><option value="F">Femenino</option><option value="TODOS">Relevos</option></select>
                        <select id="playerCategory" class="input-dark p-3 rounded-xl text-sm bg-slate-950">
                            <option value="U09">U09</option><option value="U11">U11</option><option value="U13">U13</option><option value="U15">U15</option>
                            <option value="U17">U17</option><option value="U19">U19</option><option value="Junior">Junior</option><option value="Senior">Senior</option>
                        </select>
                        <select id="playerPhase" class="input-dark p-3 rounded-xl text-sm bg-slate-950"><option value="Calificación">Calificación</option><option value="Semifinal">Semifinal</option><option value="Final">Final</option></select>
                        <input type="number" id="playerEsgrimaV" class="input-dark p-3 rounded-xl text-sm" placeholder="Victorias">
                        <input type="number" id="playerEsgrimaD" class="input-dark p-3 rounded-xl text-sm" placeholder="Derrotas">
                        <input type="number" id="playerEsgrimaTotal" class="input-dark p-3 rounded-xl text-sm" placeholder="Total Bouts">
                        <input type="text" id="playerObstaculos" class="input-dark p-3 rounded-xl text-sm" placeholder="Obs (seg)">
                        <input type="text" id="playerNatacion" class="input-dark p-3 rounded-xl text-sm" placeholder="Nat (m:s)">
                        <input type="text" id="playerLaser" class="input-dark p-3 rounded-xl text-sm" placeholder="Laser (m:s)">
                    </div>
                    <button onclick="savePlayer()" class="btn-primary mt-6 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs w-full">Guardar Atleta</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ", authDomain: "pentatlon-scores.firebaseapp.com", projectId: "pentatlon-scores", storageBucket: "pentatlon-scores.firebasestorage.app", messagingSenderId: "650229123946", appId: "1:650229123946:web:a3769c31f8ce1a23edb313" };
        const appId = 'penta-tourney-v2';
        let firebaseApp, auth, db, players = [], events = [], isAdmin = false;

        async function start() {
            firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => { if (user) setupListeners(); });
        }

        function setupListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'athletes'), (snap) => {
                players = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderViews();
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                events = snap.docs.map(d => ({ id: d.id, ...d.data() })); 
                updateEventSelect(); renderEventsList(); renderAdminEvents();
            });
        }

        window.applyMainFilters = () => { document.getElementById('subViewButtons').classList.remove('hidden'); renderViews(); switchView('ranking'); };

        function parseTime(val) {
            if (!val) return 0;
            let clean = val.toString().trim().replace(',', '.');
            if (clean.includes(':')) { const parts = clean.split(':'); return (parseFloat(parts[0]) || 0) * 60 + (parseFloat(parts[1]) || 0); }
            return parseFloat(clean) || 0;
        }

        function getFullStats(p) {
            const victories = parseInt(p.esgrimaV) || 0;
            const esgrimaPts = (parseInt(p.esgrimaTotal) || 0) > 0 ? Math.max(0, 250 + (victories - Math.ceil(parseInt(p.esgrimaTotal) * 0.7)) * 5) : 0;
            const tObs = parseTime(p.obstaculos); let obsPts = tObs >= 15 ? Math.max(0, 400 - Math.floor((tObs - 15) / 0.33)) : (tObs > 0 ? 401 : 0);
            const tNat = parseTime(p.natacion); let natPts = tNat > 0 ? Math.max(0, 375 - Math.ceil((tNat - 45) / 0.2)) : 0;
            const tLas = parseTime(p.laser); let lasPts = tLas > 0 ? Math.max(0, 700 - Math.floor(tLas - 600)) : 0;
            const handicapPts = esgrimaPts + obsPts + natPts;
            return { ...p, esgrimaPts, obsPts, natPts, lasPts, handicapPts, totalFinal: Math.round(handicapPts + lasPts) };
        }

        window.renderViews = () => {
            const selSex = document.getElementById('filterSex').value;
            const selPhase = document.getElementById('filterPhase').value;
            let data = players.map(p => getFullStats(p)).filter(p => p.sex === selSex && p.phase === selPhase);
            data.sort((a, b) => b.totalFinal - a.totalFinal);

            document.getElementById('scoreboardBody').innerHTML = data.map(p => `<tr><td class="p-5 text-xs font-black uppercase">${p.name}<br><span class="cat-tag">${p.category}</span></td><td class="p-5 pts-value">${p.obsPts}</td><td class="p-5 pts-value">${p.natPts}</td><td class="p-5 pts-value">${p.lasPts}</td><td class="p-5 font-black text-blue-400">${p.totalFinal}</td><td class="p-5 text-right admin-only ${isAdmin ? '' : 'hidden'}"><button onclick="deleteAthlete('${p.id}')" class="text-red-500 font-black">X</button></td></tr>`).join('');
            document.getElementById('statusGrid').innerHTML = data.map(p => `<div class="card p-5 rounded-2xl"><h3 class="text-xs font-black uppercase mb-4">${p.name}</h3><div class="grid grid-cols-2 gap-2"><div class="bg-slate-950 p-2 rounded-xl text-center"><p class="text-lg font-black text-green-400">${p.esgrimaV || 0}V</p></div><div class="bg-slate-950 p-2 rounded-xl text-center"><p class="text-lg font-black text-red-400">${p.esgrimaD || 0}D</p></div></div></div>`).join('');

            const hData = [...data].sort((a,b) => b.handicapPts - a.handicapPts); const best = hData[0]?.handicapPts || 0;
            document.getElementById('handicapBody').innerHTML = hData.map((p, i) => `<tr><td class="p-5 text-xs font-black uppercase">${p.name}</td><td class="p-5 pts-value">${p.handicapPts}</td><td class="p-5 text-green-500 font-mono text-[10px]">${i === 0 ? 'SALIDA' : `+${best - p.handicapPts}s`}</td></tr>`).join('');
        };

        window.switchView = (view) => {
            ['ranking', 'status', 'tournament', 'handicap', 'publicEvents'].forEach(v => {
                const el = document.getElementById(v + 'View'); if(el) el.classList.add('hidden');
                const btn = document.getElementById('btnView' + v.charAt(0).toUpperCase() + v.slice(1));
                if(btn) btn.className = "bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg";
            });
            document.getElementById(view + 'View').classList.remove('hidden');
            const targetBtn = document.getElementById('btnView' + view.charAt(0).toUpperCase() + view.slice(1));
            if(targetBtn) targetBtn.className = "bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg";
        };

        window.toggleAdminMode = () => {
            if (isAdmin) {
                // Si ya es admin, el botón "Usuario Normal" lo devuelve a usuario
                logout();
            } else {
                openLoginModal();
            }
        };

        window.logout = () => {
            isAdmin = false;
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminBadge').classList.add('hidden');
            document.getElementById('adminToggleBtn').innerText = "Admin";
            document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
            renderViews();
        };

        window.saveEvent = async () => {
            const name = document.getElementById('eventName').value;
            if(!name) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', crypto.randomUUID()), { name, date: document.getElementById('eventDate').value, location: document.getElementById('eventDesc').value });
            alert("Evento Guardado");
        };

        window.deleteEvent = async (id) => { if(confirm("¿Eliminar evento?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id)); };

        window.savePlayer = async () => {
            const data = {
                event: document.getElementById('playerEvent').value, name: document.getElementById('playerName').value,
                sex: document.getElementById('playerSex').value, category: document.getElementById('playerCategory').value,
                phase: document.getElementById('playerPhase').value, esgrimaV: document.getElementById('playerEsgrimaV').value,
                esgrimaD: document.getElementById('playerEsgrimaD').value, esgrimaTotal: document.getElementById('playerEsgrimaTotal').value,
                obstaculos: document.getElementById('playerObstaculos').value, natacion: document.getElementById('playerNatacion').value,
                laser: document.getElementById('playerLaser').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', crypto.randomUUID()), data);
            alert("Atleta Guardado");
        };

        function updateEventSelect() { document.getElementById('playerEvent').innerHTML = '<option value="">Seleccionar Evento...</option>' + events.map(e => `<option value="${e.name}">${e.name}</option>`).join(''); }
        function renderEventsList() { document.getElementById('publicEventsList').innerHTML = events.map(e => `<div class="card p-4 rounded-2xl"><p class="text-[10px] font-black text-white uppercase">${e.name}</p><p class="text-[8px] text-purple-400 uppercase">${e.location} • ${e.date}</p></div>`).join(''); }
        function renderAdminEvents() { document.getElementById('adminEventsList').innerHTML = events.map(e => `<div class="flex justify-between items-center bg-slate-900 p-2 rounded-lg border border-slate-800"><span class="text-[10px] font-bold uppercase">${e.name}</span><button onclick="deleteEvent('${e.id}')" class="text-red-500 text-[10px] font-black uppercase">Eliminar</button></div>`).join(''); }

        window.openLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
        window.closeLoginModal = () => document.getElementById('loginModal').classList.add('hidden');
        
        window.checkPassword = () => { 
            if (document.getElementById('adminPass').value === "Newman.999") { 
                isAdmin = true; 
                document.getElementById('adminPanel').classList.remove('hidden'); 
                document.getElementById('adminBadge').classList.remove('hidden');
                document.getElementById('adminToggleBtn').innerText = "Usuario Normal";
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden')); 
                closeLoginModal(); 
                renderViews(); 
            } else {
                alert("Clave incorrecta");
            }
        };
        window.deleteAthlete = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', id)); };
        start();
    </script>

    <div id="loginModal" class="fixed inset-0 bg-slate-950/95 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-sm border border-slate-800 text-center">
            <h2 class="text-xl font-black mb-6 text-white uppercase italic">Acceso Admin</h2>
            <input type="password" id="adminPass" class="input-dark w-full p-4 rounded-2xl mb-6 text-center text-2xl tracking-[0.5em]" placeholder="**">
            <button onclick="checkPassword()" class="btn-primary w-full py-4 rounded-2xl font-black text-white text-xs uppercase">Entrar</button>
            <button onclick="closeLoginModal()" class="mt-4 text-slate-600 text-[10px] font-bold uppercase">Cancelar</button>
        </div>
    </div>
</body>
</html>
