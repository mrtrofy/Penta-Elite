<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PentatlónPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .input-disabled { background: #1e293b; opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        #loadingOverlay { background: #020617; display: flex; align-items: center; justify-content: center; z-index: 100; position: fixed; inset: 0; }
        .pts-value { font-size: 0.85rem; font-weight: 800; color: #f1f5f9; }
        .cat-tag { font-size: 0.65rem; background: #1e293b; color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-weight: 700; border: 1px solid #334155; }
        .vs-circle { background: #1e293b; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; border: 1px solid #334155; margin: 10px auto; color: #38bdf8; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .accordion-open { max-height: 2000px; }
    </style>
</head>
<body class="p-2 md:p-8">
    
    <div class="flex justify-between items-center mb-4">
        <button onclick="logoutSession()" class="px-6 py-2 bg-red-600/20 border border-red-500/50 text-red-500 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs uppercase tracking-widest transition-all">
            Cerrar Sesión
        </button>
        <div id="adminBadge" class="hidden bg-blue-600/20 border border-blue-500/50 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">Modo Admin</div>
    </div>

    <div id="loadingOverlay"><div class="text-center"><div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div><p class="neon-blue font-bold uppercase text-sm">Cargando...</p></div></div>

    <div id="app" class="max-w-7xl mx-auto opacity-0 transition-opacity duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-6 gap-4">
            <div class="flex items-center gap-4">
                <img src="/deeee.jpeg" alt="Logo" class="h-20 w-auto rounded-lg shadow-lg object-contain">
                <div>
                    <h1 class="text-2xl font-black italic text-white uppercase">Penta Elite</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase">Sistema de Resultados</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-purple-900/40 text-purple-400 border border-purple-800/50 px-6 py-2 rounded-xl text-xs font-black uppercase">Eventos</button>
                <button id="adminToggleBtn" onclick="toggleAdminMode()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-black uppercase border border-slate-700">Admin</button>
            </div>
        </header>

        <div id="publicEventsView" class="block mb-6">
            <div id="publicEventsList" class="grid grid-cols-1 gap-4 mb-6"></div>
        </div>

        <main>
            <div id="resultsContainer" class="hidden space-y-6">
                <div id="navButtonsResults" class="flex flex-wrap gap-2 py-4 border-b border-slate-800">
                    <button onclick="showSubView('ranking')" id="btnRank" class="bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg">Tabla General</button>
                    <button onclick="showSubView('status')" id="btnStat" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Esgrima</button>
                    <button onclick="showSubView('tournament')" id="btnTourney" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Eliminación</button>
                    <button onclick="showSubView('laser')" id="btnLaser" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Solo Laser Run</button>
                    <button onclick="showSubView('handicap')" id="btnHandi" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Hándicap</button>
                </div>

                <div id="rankingSubView" class="subview">
                    <div class="overflow-x-auto card rounded-2xl">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-800 uppercase font-black text-slate-400">
                                <tr><th class="p-4">Atleta</th><th class="p-4">Esg</th><th class="p-4">Obs</th><th class="p-4">Nat</th><th class="p-4">Laser</th><th class="p-4">Total</th></tr>
                            </thead>
                            <tbody id="scoreboardBody" class="divide-y divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
                <div id="statusSubView" class="subview hidden"><div id="statusGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
                <div id="tournamentSubView" class="subview hidden"><div id="tournamentBrackets" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
                <div id="laserSubView" class="subview hidden">
                    <div class="card rounded-2xl overflow-hidden">
                        <table class="w-full text-left"><tbody id="laserOnlyBody" class="divide-y divide-slate-800"></tbody></table>
                    </div>
                </div>
                <div id="handicapSubView" class="subview hidden"><div class="card rounded-2xl overflow-hidden"><table class="w-full text-left"><tbody id="handicapBody" class="divide-y divide-slate-800"></tbody></table></div></div>
            </div>

            <section id="adminPanel" class="hidden space-y-8 mt-12 border-t-2 border-dashed border-slate-800 pt-12">
                
                <div class="card p-6 rounded-3xl">
                    <h2 class="text-blue-400 font-black uppercase mb-4 text-sm">Registrar Atleta</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="playerEvent" class="input-dark p-3 rounded-xl text-xs bg-slate-950 col-span-full"></select>
                        <input type="text" id="playerName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Completo">
                        <select id="playerState" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Estado...</option></select>
                        <select id="playerSex" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="M">Masculino</option><option value="F">Femenino</option><option value="TODOS">Relevos</option></select>
                        <select id="playerCategory" class="input-dark p-3 rounded-xl text-xs bg-slate-950">
                            <option value="U09">U09</option><option value="U11">U11</option><option value="U13">U13</option><option value="U15">U15</option>
                            <option value="U17">U17</option><option value="U19">U19</option><option value="Junior">Junior</option><option value="Senior">Senior</option>
                        </select>
                        <select id="playerPhase" class="input-dark p-3 rounded-xl text-xs bg-slate-950">
                            <option value="Clasificación">1. Clasificación</option><option value="Semifinal">2. Semifinal</option><option value="Final">3. Final</option>
                        </select>
                        <select id="playerDiscBase" class="input-dark p-3 rounded-xl text-xs bg-slate-950">
                            <option value="Pentatlon Moderno">Pentatlon Moderno</option>
                            <option value="Obstaculos Laser Run">Obstaculos Laser Run</option>
                            <option value="OCR 100">OCR 100</option>
                            <option value="OCR 400">OCR 400</option>
                            <option value="OCR 3 Km +">OCR 3 Km +</option>
                        </select>
                    </div>
                    <button onclick="savePlayer()" class="btn-primary mt-4 text-white px-10 py-3 rounded-xl font-black uppercase text-xs w-full">Guardar Atleta Base</button>
                </div>

                <div class="card p-6 rounded-3xl border-2 border-blue-500/30">
                    <h2 class="text-white font-black uppercase mb-6 text-sm flex items-center gap-2">
                        <span class="w-2 h-4 bg-blue-500 rounded"></span> Registrar Disciplina y Tiempos
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="discEvent" class="input-dark p-3 rounded-xl text-xs bg-slate-950 col-span-full border-blue-900/50"></select>
                        
                        <input type="text" id="discName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Atleta">
                        <select id="discState" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Estado...</option></select>
                        <select id="discClub" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="">Club...</option></select>

                        <div class="col-span-full">
                            <label class="text-[10px] font-black text-blue-400 uppercase mb-2 block">Seleccionar Disciplina</label>
                            <select id="playerDisc" onchange="updateAdminInputs(this.value)" class="input-dark p-3 rounded-xl text-sm bg-blue-950/30 w-full font-bold">
                                <option value="Pentatlon Moderno">Pentatlon Moderno</option>
                                <option value="Obstaculos Laser Run">Obstaculos Laser Run</option>
                                <option value="OCR 100">OCR 100</option>
                                <option value="OCR 400">OCR 400</option>
                                <option value="OCR 3 Km +">OCR 3 Km +</option>
                            </select>
                        </div>

                        <input type="number" id="playerEsgrimaV" class="input-dark p-3 rounded-xl text-xs" placeholder="Esg Victorias">
                        <input type="number" id="playerEsgrimaD" class="input-dark p-3 rounded-xl text-xs" placeholder="Esg Derrotas">
                        <input type="number" id="playerEsgrimaTotal" class="input-dark p-3 rounded-xl text-xs" placeholder="Esg Total Bouts">
                        <input type="text" id="playerObstaculos" class="input-dark p-3 rounded-xl text-xs" placeholder="Obstáculos (seg)">
                        <input type="text" id="playerNatacion" class="input-dark p-3 rounded-xl text-xs" placeholder="Natación (m:s)">
                        <input type="text" id="playerLaser" class="input-dark p-3 rounded-xl text-xs" placeholder="Laser Run (m:s)">
                    </div>
                    <button onclick="saveDiscData()" class="btn-primary mt-6 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs w-full shadow-lg">Registrar Tiempos</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="card p-4 rounded-2xl">
                         <h3 class="text-purple-400 font-black uppercase mb-3 text-[10px]">Nuevo Evento</h3>
                         <input type="text" id="eventName" class="input-dark w-full p-2 rounded-lg text-[10px] mb-2" placeholder="Nombre">
                         <input type="date" id="eventDate" class="input-dark w-full p-2 rounded-lg text-[10px] mb-2">
                         <button onclick="saveEvent()" class="bg-purple-600 w-full py-2 rounded-lg font-black text-[9px] uppercase">Guardar</button>
                    </div>
                    <div class="card p-4 rounded-2xl">
                         <h3 class="text-green-400 font-black uppercase mb-3 text-[10px]">Nuevo Estado</h3>
                         <input type="text" id="stateName" class="input-dark w-full p-2 rounded-lg text-[10px] mb-2" placeholder="Estado">
                         <button onclick="saveOption('states', 'stateName')" class="bg-green-600 w-full py-2 rounded-lg font-black text-[9px] uppercase">Agregar</button>
                    </div>
                    <div class="card p-4 rounded-2xl">
                         <h3 class="text-orange-400 font-black uppercase mb-3 text-[10px]">Nuevo Club</h3>
                         <input type="text" id="clubName" class="input-dark w-full p-2 rounded-lg text-[10px] mb-2" placeholder="Club">
                         <button onclick="saveOption('clubs', 'clubName')" class="bg-orange-600 w-full py-2 rounded-lg font-black text-[9px] uppercase">Agregar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ", authDomain: "pentatlon-scores.firebaseapp.com", projectId: "pentatlon-scores", storageBucket: "pentatlon-scores.firebasestorage.app", messagingSenderId: "650229123946", appId: "1:650229123946:web:a3769c31f8ce1a23edb313" };
        const appId = 'penta-tourney-v2';
        let firebaseApp, auth, db, players = [], events = [], isAdmin = false;

        async function start() {
            firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp);
            onAuthStateChanged(auth, (user) => { if (user) setupListeners(); else window.location.href = 'index.html'; });
        }

        window.logoutSession = async () => { try { await signOut(auth); } catch (e) { window.location.href = 'index.html'; } };

        function setupListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'athletes'), (snap) => {
                players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateEventSelect(); renderEventsList();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'states'), (snap) => {
                const data = snap.docs.map(d => d.data().name);
                const options = `<option value="">Estado...</option>` + data.map(n => `<option value="${n}">${n}</option>`).join('');
                document.getElementById('playerState').innerHTML = options;
                document.getElementById('discState').innerHTML = options;
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clubs'), (snap) => {
                const data = snap.docs.map(d => d.data().name);
                const options = `<option value="">Club...</option>` + data.map(n => `<option value="${n}">${n}</option>`).join('');
                document.getElementById('discClub').innerHTML = options;
            });
        }

        window.updateAdminInputs = (disc) => {
            const fields = ['playerEsgrimaV', 'playerEsgrimaD', 'playerEsgrimaTotal', 'playerObstaculos', 'playerNatacion', 'playerLaser'];
            fields.forEach(f => { const el = document.getElementById(f); el.disabled = false; el.classList.remove('input-disabled'); });
            
            if (disc.startsWith("OCR")) {
                ['playerEsgrimaV', 'playerEsgrimaD', 'playerEsgrimaTotal', 'playerNatacion', 'playerLaser'].forEach(f => {
                    const el = document.getElementById(f); el.disabled = true; el.classList.add('input-disabled'); el.value = "";
                });
            } else if (disc === "Obstaculos Laser Run") {
                ['playerEsgrimaV', 'playerEsgrimaD', 'playerEsgrimaTotal', 'playerNatacion'].forEach(f => {
                    const el = document.getElementById(f); el.disabled = true; el.classList.add('input-disabled'); el.value = "";
                });
            }
        };

        window.saveDiscData = async () => {
            const data = {
                event: document.getElementById('discEvent').value,
                name: document.getElementById('discName').value,
                state: document.getElementById('discState').value,
                club: document.getElementById('discClub').value,
                discipline: document.getElementById('playerDisc').value,
                esgrimaV: document.getElementById('playerEsgrimaV').value,
                esgrimaD: document.getElementById('playerEsgrimaD').value,
                esgrimaTotal: document.getElementById('playerEsgrimaTotal').value,
                obstaculos: document.getElementById('playerObstaculos').value,
                natacion: document.getElementById('playerNatacion').value,
                laser: document.getElementById('playerLaser').value,
                sex: 'M', category: 'U09', phase: 'Final'
            };
            if(!data.name || !data.event) return alert("Nombre y Evento obligatorios");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', crypto.randomUUID()), data);
            alert("Tiempos Guardados");
        };

        window.savePlayer = async () => {
            const data = {
                event: document.getElementById('playerEvent').value, name: document.getElementById('playerName').value,
                state: document.getElementById('playerState').value,
                sex: document.getElementById('playerSex').value, category: document.getElementById('playerCategory').value,
                phase: document.getElementById('playerPhase').value, discipline: document.getElementById('playerDiscBase').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', crypto.randomUUID()), data);
            alert("Atleta Base Guardado");
        };

        // Lógica de visualización (Sin cambios según instrucción)
        window.applyFilters = (eventName, eventId) => {
            const sex = document.getElementById('sex-'+eventId).value;
            const phase = document.getElementById('phase-'+eventId).value;
            const cat = document.getElementById('cat-'+eventId).value;
            const disc = document.getElementById('disc-'+eventId).value;
            document.getElementById('publicEventsList').classList.add('hidden');
            document.getElementById('resultsContainer').classList.remove('hidden');
            renderResults(eventName, sex, phase, cat, disc);
        };

        window.showSubView = (view) => {
            document.querySelectorAll('.subview').forEach(v => v.classList.add('hidden'));
            document.getElementById(view + 'SubView').classList.remove('hidden');
            const btns = {ranking:'Rank', status:'Stat', tournament:'Tourney', laser:'Laser', handicap:'Handi'};
            Object.values(btns).forEach(b => document.getElementById('btn'+b).className = "bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg");
            document.getElementById('btn'+btns[view]).className = "bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg";
        };

        function parseTime(val) {
            if (!val) return 0;
            let clean = val.toString().trim().replace(',', '.');
            if (clean.includes(':')) { const parts = clean.split(':'); return (parseFloat(parts[0]) || 0) * 60 + (parseFloat(parts[1]) || 0); }
            return parseFloat(clean) || 0;
        }

        function renderResults(eventName, sex, phase, category, discipline) {
            let filtered = players.filter(p => p.event === eventName && p.sex === sex && p.phase === phase && p.category === category && p.discipline === discipline);
            let data = filtered.map(p => {
                const total = parseTime(p.obstaculos) + parseTime(p.natacion) + parseTime(p.laser);
                return { ...p, total };
            }).sort((a,b) => b.total - a.total);

            document.getElementById('scoreboardBody').innerHTML = data.map(p => `<tr><td class="p-4 font-black uppercase">${p.name}<br><span class="text-[8px] text-slate-500">${p.club || ''}</span></td><td class="p-4 pts-value">-</td><td class="p-4 pts-value">${p.obstaculos || '0'}</td><td class="p-4 pts-value">${p.natacion || '0'}</td><td class="p-4 pts-value">${p.laser || '0'}</td><td class="p-4 font-black text-blue-400">${p.total}s</td></tr>`).join('');
            
            const laserSorted = [...data].sort((a,b) => parseTime(b.laser) - parseTime(a.laser));
            document.getElementById('laserOnlyBody').innerHTML = laserSorted.map(p => `<tr><td class="p-4 font-black uppercase">${p.name}</td><td class="p-4 font-black text-blue-400 text-right">${p.laser || '0'}</td></tr>`).join('');

            const hData = [...data].sort((a,b) => a.total - b.total);
            const best = hData[0]?.total || 0;
            document.getElementById('handicapBody').innerHTML = hData.map((p,i) => `<tr><td class="p-4 font-black uppercase">${p.name}</td><td class="p-4 text-right font-bold text-green-500">${i===0 ? 'SALIDA' : `+${p.total - best}s`}</td></tr>`).join('');
            
            showSubView('ranking');
        }

        window.saveEvent = async () => {
            const name = document.getElementById('eventName').value; if(!name) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', crypto.randomUUID()), { name, date: document.getElementById('eventDate').value });
            document.getElementById('eventName').value = "";
        };

        window.saveOption = async (coll, inputId) => {
            const name = document.getElementById(inputId).value; if(!name) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, crypto.randomUUID()), { name });
            document.getElementById(inputId).value = "";
        };

        function updateEventSelect() { 
            const opt = events.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            document.getElementById('playerEvent').innerHTML = opt;
            document.getElementById('discEvent').innerHTML = opt;
        }
        
        function renderEventsList() {
            document.getElementById('publicEventsList').innerHTML = events.map(e => `
                <div class="card rounded-2xl overflow-hidden shadow-2xl mb-4">
                    <div onclick="document.getElementById('acc-${e.id}').classList.toggle('accordion-open')" class="p-6 flex justify-between items-center cursor-pointer">
                        <p class="text-xs font-black text-white uppercase">${e.name}</p><div class="text-blue-500">▼</div>
                    </div>
                    <div id="acc-${e.id}" class="accordion-content bg-slate-900/20 px-6">
                        <div class="py-6 space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <select id="sex-${e.id}" class="input-dark p-3 rounded-xl text-xs"><option value="M">HOMBRE</option><option value="F">MUJER</option><option value="TODOS">RELEVOS</option></select>
                                <select id="disc-${e.id}" class="input-dark p-3 rounded-xl text-xs">
                                    <option value="Pentatlon Moderno">Pentatlon Moderno</option><option value="Obstaculos Laser Run">Obstaculos Laser Run</option><option value="OCR 100">OCR 100</option><option value="OCR 400">OCR 400</option><option value="OCR 3 Km +">OCR 3 Km +</option>
                                </select>
                                <select id="cat-${e.id}" class="input-dark p-3 rounded-xl text-xs"><option value="U09">U09</option><option value="U11">U11</option><option value="U13">U13</option><option value="U15">U15</option><option value="U17">U17</option><option value="U19">U19</option><option value="Junior">Junior</option><option value="Senior">Senior</option></select>
                                <select id="phase-${e.id}" class="input-dark p-3 rounded-xl text-xs"><option value="Clasificación">CLASIFICACIÓN</option><option value="Semifinal">SEMIFINAL</option><option value="Final">FINAL</option></select>
                            </div>
                            <button onclick="applyFilters('${e.name}', '${e.id}')" class="btn-primary w-full py-4 rounded-2xl text-xs font-black uppercase">Ver Resultados</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.toggleAdminMode = () => { isAdmin ? (isAdmin=false, document.getElementById('adminPanel').classList.add('hidden')) : openLoginModal(); };
        window.openLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
        window.checkPassword = () => { if(document.getElementById('adminPass').value === "Newman.999") { isAdmin=true; document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('loginModal').classList.add('hidden'); } };
        
        start();
    </script>

    <div id="loginModal" class="fixed inset-0 bg-slate-950 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-sm border border-slate-800 text-center">
