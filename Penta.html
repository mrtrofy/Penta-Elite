<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PentatlónPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        #loadingOverlay { background: #020617; display: flex; align-items: center; justify-content: center; z-index: 100; position: fixed; inset: 0; }
        .pts-value { font-size: 0.85rem; font-weight: 800; color: #f1f5f9; }
        .cat-tag { font-size: 0.65rem; background: #1e293b; color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-weight: 700; border: 1px solid #334155; }
        .vs-circle { background: #1e293b; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; border: 1px solid #334155; margin: 10px auto; color: #38bdf8; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .accordion-open { max-height: 2000px; }
    </style>
</head>
<body class="p-2 md:p-8">
    
    <div class="flex justify-between items-center mb-4">
        <button onclick="logoutSession()" class="px-6 py-2 bg-red-600/20 border border-red-500/50 text-red-500 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs uppercase tracking-widest transition-all">
            Cerrar Sesión
        </button>
        <div id="adminBadge" class="hidden bg-blue-600/20 border border-blue-500/50 text-blue-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">Modo Admin</div>
    </div>

    <div id="loadingOverlay"><div class="text-center"><div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div><p class="neon-blue font-bold uppercase text-sm">Cargando...</p></div></div>

    <div id="app" class="max-w-7xl mx-auto opacity-0 transition-opacity duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-6 gap-4">
            <div class="flex items-center gap-4">
                <img src="/deeee.jpeg" alt="Logo" class="h-20 w-auto rounded-lg shadow-lg object-contain">
                <div>
                    <h1 class="text-2xl font-black italic text-white uppercase">Penta Elite</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase">Sistema de Resultados</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="location.reload()" class="bg-purple-900/40 text-purple-400 border border-purple-800/50 px-6 py-2 rounded-xl text-xs font-black uppercase">Eventos</button>
                <button id="adminToggleBtn" onclick="toggleAdminMode()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-black uppercase border border-slate-700">Admin</button>
            </div>
        </header>

        <div id="publicEventsView" class="block mb-6">
            <div id="publicEventsList" class="grid grid-cols-1 gap-4 mb-6"></div>
        </div>

        <main>
            <div id="resultsContainer" class="hidden space-y-6">
                <div id="navButtonsResults" class="flex flex-wrap gap-2 py-4 border-b border-slate-800">
                    <button onclick="showSubView('ranking')" id="btnRank" class="bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg">Tabla General</button>
                    <button onclick="showSubView('status')" id="btnStat" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Clasificación-Esgrima</button>
                    <button onclick="showSubView('tournament')" id="btnTourney" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Eliminacion-Directa</button>
                    <button onclick="showSubView('handicap')" id="btnHandi" class="bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg">Hándicap</button>
                </div>

                <div id="rankingSubView" class="subview">
                    <div class="overflow-x-auto card rounded-2xl">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-800 uppercase font-black text-slate-400">
                                <tr><th class="p-4">Atleta</th><th class="p-4">Esg</th><th class="p-4">Obs</th><th class="p-4">Nat</th><th class="p-4">Laser</th><th class="p-4">Total</th></tr>
                            </thead>
                            <tbody id="scoreboardBody" class="divide-y divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
                <div id="statusSubView" class="subview hidden"><div id="statusGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
                <div id="tournamentSubView" class="subview hidden"><div id="tournamentBrackets" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div></div>
                <div id="handicapSubView" class="subview hidden"><div class="card rounded-2xl overflow-hidden"><table class="w-full text-left"><tbody id="handicapBody" class="divide-y divide-slate-800"></tbody></table></div></div>
            </div>

            <section id="adminPanel" class="hidden space-y-8 mt-12 border-t-2 border-dashed border-slate-800 pt-12">
                <div class="card p-6 rounded-3xl">
                    <h2 class="text-purple-400 font-black uppercase mb-4 text-sm">Crear Evento</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                        <input type="text" id="eventName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Evento">
                        <input type="date" id="eventDate" class="input-dark p-3 rounded-xl text-xs">
                        <input type="text" id="eventDesc" class="input-dark p-3 rounded-xl text-xs" placeholder="Lugar">
                    </div>
                    <button onclick="saveEvent()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase">Guardar Evento</button>
                    <div id="adminEventsList" class="mt-4 space-y-2"></div>
                </div>

                <div class="card p-6 rounded-3xl">
                    <h2 class="text-blue-400 font-black uppercase mb-4 text-sm">Registrar Atleta</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <select id="playerEvent" class="input-dark p-3 rounded-xl text-xs bg-slate-950 col-span-full"></select>
                        <input type="text" id="playerName" class="input-dark p-3 rounded-xl text-xs" placeholder="Nombre Completo">
                        <select id="playerSex" class="input-dark p-3 rounded-xl text-xs bg-slate-950"><option value="M">Masculino</option><option value="F">Femenino</option><option value="TODOS">Relevos</option></select>
                        <select id="playerCategory" class="input-dark p-3 rounded-xl text-xs bg-slate-950">
                            <option value="U09">U09</option><option value="U11">U11</option><option value="U13">U13</option><option value="U15">U15</option>
                            <option value="U17">U17</option><option value="U19">U19</option><option value="Junior">Junior</option><option value="Senior">Senior</option>
                        </select>
                        <select id="playerPhase" class="input-dark p-3 rounded-xl text-xs bg-slate-950">
                            <option value="Clasificación">1. Clasificación</option>
                            <option value="Semifinal">2. Semifinal</option>
                            <option value="Final">3. Final</option>
                        </select>
                        <input type="number" id="playerEsgrimaV" class="input-dark p-3 rounded-xl text-xs" placeholder="Victorias">
                        <input type="number" id="playerEsgrimaD" class="input-dark p-3 rounded-xl text-xs" placeholder="Derrotas">
                        <input type="number" id="playerEsgrimaTotal" class="input-dark p-3 rounded-xl text-xs" placeholder="Total Bouts">
                        <input type="text" id="playerObstaculos" class="input-dark p-3 rounded-xl text-xs" placeholder="Obs (seg)">
                        <input type="text" id="playerNatacion" class="input-dark p-3 rounded-xl text-xs" placeholder="Nat (m:s)">
                        <input type="text" id="playerLaser" class="input-dark p-3 rounded-xl text-xs" placeholder="Laser (m:s)">
                    </div>
                    <button onclick="savePlayer()" class="btn-primary mt-6 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs w-full">Guardar Atleta</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ", authDomain: "pentatlon-scores.firebaseapp.com", projectId: "pentatlon-scores", storageBucket: "pentatlon-scores.firebasestorage.app", messagingSenderId: "650229123946", appId: "1:650229123946:web:a3769c31f8ce1a23edb313" };
        const appId = 'penta-tourney-v2';
        let firebaseApp, auth, db, players = [], events = [], isAdmin = false;

        async function start() {
            firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp);
            onAuthStateChanged(auth, (user) => { 
                if (user) { setupListeners(); } 
                else { window.location.href = 'index.html'; }
            });
        }

        window.logoutSession = async () => {
            try { await signOut(auth); } 
            catch (error) { window.location.href = 'index.html'; }
        };

        function setupListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'athletes'), (snap) => {
                players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('app').classList.replace('opacity-0', 'opacity-100');
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                events = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date)); 
                updateEventSelect(); renderEventsList(); renderAdminEvents();
            });
        }

        window.toggleAccordion = (id) => {
            const content = document.getElementById('acc-' + id);
            content.classList.toggle('accordion-open');
        };

        window.applyFilters = (eventName, eventId) => {
            const sex = document.getElementById('sex-'+eventId).value;
            const phase = document.getElementById('phase-'+eventId).value;
            document.getElementById('publicEventsList').classList.add('hidden');
            document.getElementById('resultsContainer').classList.remove('hidden');
            renderResults(eventName, sex, phase);
        };

        window.showSubView = (view) => {
            document.querySelectorAll('.subview').forEach(v => v.classList.add('hidden'));
            document.getElementById(view + 'SubView').classList.remove('hidden');
            ['Rank', 'Stat', 'Handi', 'Tourney'].forEach(id => {
                const btn = document.getElementById('btn'+id);
                if(btn) btn.className = "bg-slate-800 text-slate-400 text-[9px] font-black uppercase px-4 py-2 rounded-lg";
            });
            const btnMap = {ranking: 'Rank', status: 'Stat', handicap: 'Handi', tournament: 'Tourney'};
            document.getElementById('btn'+btnMap[view]).className = "bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-lg";
        };

        function parseTime(val) {
            if (!val) return 0;
            let clean = val.toString().trim().replace(',', '.');
            if (clean.includes(':')) { const parts = clean.split(':'); return (parseFloat(parts[0]) || 0) * 60 + (parseFloat(parts[1]) || 0); }
            return parseFloat(clean) || 0;
        }

        function renderResults(eventName, sex, phase) {
            const pointsTable = [250, 244, 238, 236, 230, 228, 226, 224, 218, 216, 214, 212, 210, 208, 206, 204, 198, 196];
            let esgrimaSorted = players
                .filter(p => p.event === eventName && p.sex === sex && p.phase === phase)
                .sort((a, b) => (parseInt(b.esgrimaV) || 0) - (parseInt(a.esgrimaV) || 0));

            let data = esgrimaSorted.map((p, index) => {
                const esgrimaPts = pointsTable[index] !== undefined ? pointsTable[index] : (196 - ((index - 17) * 2));
                const tObs = parseTime(p.obstaculos); let obsPts = tObs > 0 ? Math.max(0, 400 - Math.floor((tObs - 15) / 0.33)) : 0;
                const tNat = parseTime(p.natacion); let natPts = tNat > 0 ? Math.max(0, 375 - Math.ceil((tNat - 45) / 0.2)) : 0;
                const tLas = parseTime(p.laser); let lasPts = tLas > 0 ? Math.max(0, 700 - Math.floor(tLas - 600)) : 0;
                const hPts = esgrimaPts + obsPts + natPts;
                return { ...p, esgrimaPts, obsPts, natPts, lasPts, hPts, total: Math.round(hPts + lasPts) };
            }).sort((a,b) => b.total - a.total);

            document.getElementById('scoreboardBody').innerHTML = data.map(p => `<tr><td class="p-4 font-black uppercase">${p.name}<br><span class="cat-tag">${p.category}</span></td><td class="p-4 pts-value text-blue-300">${p.esgrimaPts}</td><td class="p-4 pts-value">${p.obsPts}</td><td class="p-4 pts-value">${p.natPts}</td><td class="p-4 pts-value">${p.lasPts}</td><td class="p-4 font-black text-blue-400">${p.total}</td></tr>`).join('');
            document.getElementById('statusGrid').innerHTML = data.map(p => `<div class="card p-4 rounded-xl text-center"><p class="text-[10px] font-black uppercase mb-2">${p.name}</p><div class="grid grid-cols-2 gap-2"><div class="bg-green-900/20 p-2 rounded text-green-400 font-bold">${p.esgrimaV}V</div><div class="bg-red-900/20 p-2 rounded text-red-400 font-bold">${p.esgrimaD}D</div></div></div>`).join('');
            
            const pairs = [];
            let tempPlayers = [...data];
            while (tempPlayers.length > 1) { pairs.push({ p1: tempPlayers.shift(), p2: tempPlayers.pop() }); }
            if (tempPlayers.length === 1) pairs.push({ p1: tempPlayers[0], p2: { name: "BYE", total: 0 } });
            
            document.getElementById('tournamentBrackets').innerHTML = pairs.map(pair => `
                <div class="card p-4 rounded-2xl border-l-4 border-l-blue-600">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase"><span>${pair.p1.name}</span><span class="text-blue-400">${pair.p1.total}</span></div>
                    <div class="vs-circle">VS</div>
                    <div class="flex justify-between items-center text-[10px] font-black uppercase"><span>${pair.p2.name}</span><span class="text-blue-400">${pair.p2.total}</span></div>
                </div>
            `).join('');

            // CAMBIO: Ordenamos hData específicamente por hPts de mayor a menor para el Hándicap
            const hData = [...data].sort((a,b) => b.hPts - a.hPts); 
            const best = hData[0]?.hPts || 0;
            document.getElementById('handicapBody').innerHTML = hData.map((p, i) => `<tr><td class="p-4 font-black uppercase">${p.name}</td><td class="p-4 pts-value">${p.hPts}</td><td class="p-4 text-green-500 font-mono">${i === 0 ? '0' : `+${best - p.hPts}s`}</td></tr>`).join('');
            showSubView('ranking');
        }

        window.toggleAdminMode = () => { if (isAdmin) { logoutAdmin(); } else { openLoginModal(); } };
        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminBadge').classList.add('hidden');
            document.getElementById('adminToggleBtn').innerText = "Admin";
        }

        window.saveEvent = async () => {
            const name = document.getElementById('eventName').value;
            if(!name) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', crypto.randomUUID()), { name, date: document.getElementById('eventDate').value, location: document.getElementById('eventDesc').value });
            alert("Evento Guardado");
        };

        window.savePlayer = async () => {
            const data = {
                event: document.getElementById('playerEvent').value, name: document.getElementById('playerName').value,
                sex: document.getElementById('playerSex').value, category: document.getElementById('playerCategory').value,
                phase: document.getElementById('playerPhase').value, esgrimaV: document.getElementById('playerEsgrimaV').value,
                esgrimaD: document.getElementById('playerEsgrimaD').value, esgrimaTotal: document.getElementById('playerEsgrimaTotal').value,
                obstaculos: document.getElementById('playerObstaculos').value, natacion: document.getElementById('playerNatacion').value,
                laser: document.getElementById('playerLaser').value
            };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', crypto.randomUUID()), data);
            alert("Atleta Guardado");
        };

        function renderEventsList() { 
            document.getElementById('publicEventsList').innerHTML = events.map(e => `
                <div class="card rounded-2xl overflow-hidden shadow-2xl">
                    <div onclick="toggleAccordion('${e.id}')" class="p-6 flex justify-between items-center cursor-pointer hover:bg-slate-800/40">
                        <div><p class="text-xs font-black text-white uppercase tracking-tighter">${e.name}</p><p class="text-[9px] text-blue-400 font-bold uppercase mt-1">${e.location} • ${e.date}</p></div>
                        <div class="bg-slate-800 p-2 rounded-lg text-blue-500">▼</div>
                    </div>
                    <div id="acc-${e.id}" class="accordion-content bg-slate-900/20 px-6">
                        <div class="py-6 border-t border-slate-800/50 space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[9px] uppercase font-black text-slate-500 ml-1">Género</label><select id="sex-${e.id}" class="input-dark w-full p-3 rounded-xl mt-1 text-xs"><option value="M">HOMBRE</option><option value="F">MUJER</option><option value="TODOS">RELEVOS</option></select></div>
                                <div><label class="text-[9px] uppercase font-black text-slate-500 ml-1">Fase</label>
                                <select id="phase-${e.id}" class="input-dark w-full p-3 rounded-xl mt-1 text-xs">
                                    <option value="Clasificación">1. CLASIFICACIÓN</option>
                                    <option value="Semifinal">2. SEMIFINAL</option>
                                    <option value="Final">3. FINAL</option>
                                </select></div>
                            </div>
                            <button onclick="applyFilters('${e.name}', '${e.id}')" class="btn-primary w-full py-4 rounded-2xl text-xs font-black uppercase">Ver Resultados</button>
                        </div>
                    </div>
                </div>
            `).join(''); 
        }

        window.deleteEvent = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id)); };
        function updateEventSelect() { document.getElementById('playerEvent').innerHTML = events.map(e => `<option value="${e.name}">${e.name}</option>`).join(''); }
        function renderAdminEvents() { document.getElementById('adminEventsList').innerHTML = events.map(e => `<div class="flex justify-between items-center bg-slate-900 p-2 rounded-lg border border-slate-800"><span class="text-[10px] font-bold uppercase">${e.name}</span><button onclick="deleteEvent('${e.id}')" class="text-red-500 font-black">ELIMINAR</button></div>`).join(''); }

        window.openLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
        window.closeLoginModal = () => document.getElementById('loginModal').classList.add('hidden');
        window.checkPassword = () => { 
            if (document.getElementById('adminPass').value === "Newman.999") { 
                isAdmin = true; 
                document.getElementById('adminPanel').classList.remove('hidden'); 
                document.getElementById('adminBadge').classList.remove('hidden');
                document.getElementById('adminToggleBtn').innerText = "Usuario Normal";
                closeLoginModal(); 
            } else { alert("Error"); }
        };
        start();
    </script>

    <div id="loginModal" class="fixed inset-0 bg-slate-950/98 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-sm border border-slate-800 text-center">
            <h2 class="text-xl font-black mb-6 text-white uppercase">Acceso Admin</h2>
            <input type="password" id="adminPass" class="input-dark w-full p-4 rounded-2xl mb-6 text-center text-2xl" placeholder="****">
            <button onclick="checkPassword()" class="btn-primary w-full py-4 rounded-2xl font-black text-white text-xs uppercase">Entrar</button>
            <button onclick="closeLoginModal()" class="mt-4 text-slate-600 text-[10px] font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) || (e.ctrlKey && e.key === "u")) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
