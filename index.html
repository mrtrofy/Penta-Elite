<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Penta Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="/logo1.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            display: none; /* Se mantiene oculto hasta que Firebase responda */
        }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .social-btn {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s;
            cursor: pointer;
        }
        .social-btn:hover { background: #334155; border-color: #38bdf8; }

        #loadingOverlay { 
            background: #020617; 
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            align-items: center; justify-content: center; 
            z-index: 100; 
        }

        .cat-tag { 
            font-size: 0.65rem; 
            background: #1e293b; 
            color: #38bdf8; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: 700; 
            border: 1px solid #334155; 
        }

        .divider {
            display: flex; align-items: center; text-align: center;
            color: #64748b; font-size: 0.75rem; margin: 1.5rem 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #1e293b; }
        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loadingOverlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p id="loadingStatus" class="text-sm font-bold neon-blue tracking-widest uppercase text-center px-4">Sincronizando...</p>
        </div>
    </div>

    <div id="authSection" class="card w-full max-w-md rounded-2xl p-8 shadow-2xl hidden">
        <div class="text-center mb-8">
            <div class="inline-block mb-3">
                <span class="cat-tag uppercase tracking-tighter">Protocolo de Acceso</span>
            </div>
            <h1 class="text-3xl font-black mb-2"><span class="neon-blue">Penta Elite</span></h1>
        </div>

        <button id="googleBtn" type="button" class="social-btn w-full flex items-center justify-center gap-3 py-4 rounded-xl text-sm font-bold mb-6">
            <i data-lucide="chrome" class="w-5 h-5 text-red-400"></i>
            Acceder con Google
        </button>

        <div class="divider uppercase font-black">o credenciales</div>

        <form id="registerForm" class="space-y-4">
            <input type="email" id="email" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="Correo Electrónico">
            <input type="password" id="password" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="Contraseña">
            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest mt-4">
                Iniciar Sesión / Registro
            </button>
        </form>
    </div>

    <div id="mainContent" class="text-center hidden">
        <div class="card p-10 rounded-3xl border-sky-500/30">
            <h2 class="text-4xl font-black mb-2">BIENVENIDO, <span id="userName" class="neon-blue uppercase">AGENTE</span></h2>
            <p class="text-slate-400 mb-8 tracking-widest text-xs uppercase">Acceso nivel Alpha verificado</p>
            
            <div class="grid grid-cols-1 gap-4">
                <button class="btn-primary py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Entrar al Panel de Control</button>
                <button onclick="logout()" class="text-slate-500 text-xs font-bold uppercase hover:text-red-400 transition-colors mt-4">Desconectar Sesión</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, 
            createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ",
            authDomain: "pentatlon-scores.firebaseapp.com",
            projectId: "pentatlon-scores",
            storageBucket: "pentatlon-scores.firebasestorage.app",
            messagingSenderId: "650229123946",
            appId: "1:650229123946:web:a3769c31f8ce1a23edb313"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const loader = document.getElementById('loadingOverlay');
        const authSection = document.getElementById('authSection');
        const mainContent = document.getElementById('mainContent');

        lucide.createIcons();

        // CONTROLADOR DE ESTADO: Muestra u oculta secciones según la sesión
        onAuthStateChanged(auth, (user) => {
            document.body.style.display = "flex"; // Revelamos la página solo tras verificar
            if (user) {
                authSection.classList.add('hidden');
                mainContent.classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            } else {
                mainContent.classList.add('hidden');
                authSection.classList.remove('hidden');
            }
        });

        // Google Login
        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            loader.style.display = 'flex';
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                if (error.code !== 'auth/cancelled-popup-request') alert(error.message);
            } finally {
                loader.style.display = 'none';
            }
        };

        // Manual: Login o Registro Automático
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            loader.style.display = 'flex';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    // Si el usuario no existe, intentamos registrarlo
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (err) { alert("Error al crear cuenta: " + err.message); }
                } else {
                    alert("Acceso Denegado: " + error.message);
                }
            } finally {
                loader.style.display = 'none';
            }
        };

        window.logout = () => signOut(auth);
        document.getElementById('googleBtn').onclick = handleGoogleLogin;

    </script>
</body>
</html>
