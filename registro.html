<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | CyberGate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card { background: #0f172a; border: 1px solid #1e293b; }
        .input-dark { background: #020617; border: 1px solid #334155; color: #f1f5f9; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .neon-blue { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .social-btn {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .social-btn:hover {
            background: #334155;
        }

        #loadingOverlay { 
            background: #020617; 
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
        }

        .cat-tag { 
            font-size: 0.65rem; 
            background: #1e293b; 
            color: #38bdf8; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: 700; 
            border: 1px solid #334155; 
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #1e293b;
        }
        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loadingOverlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-sm font-bold neon-blue tracking-widest uppercase">Procesando...</p>
        </div>
    </div>

    <div class="card w-full max-w-md rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-block mb-3">
                <span class="cat-tag uppercase tracking-tighter">Acceso Seguro</span>
            </div>
            <h1 class="text-3xl font-black mb-2">Crear <span class="neon-blue">Cuenta</span></h1>
            <p class="text-slate-400 text-sm">Únete a la plataforma del futuro</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="loginWithGoogle()" class="social-btn flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold">
                <i data-lucide="chrome" class="w-5 h-5 text-red-400"></i>
                Google
            </button>
            <button onclick="loginWithFacebook()" class="social-btn flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold">
                <i data-lucide="facebook" class="w-5 h-5 text-blue-500"></i>
                Facebook
            </button>
        </div>

        <div class="divider uppercase font-black">o continuar con email</div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Correo Electrónico</label>
                <input type="email" id="email" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="nombre@ejemplo.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Contraseña</label>
                <input type="password" id="password" required class="input-dark w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
            </div>

            <div class="flex items-center gap-2 py-2">
                <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-slate-700 bg-slate-900 checked:bg-blue-600">
                <label for="terms" class="text-xs text-slate-400">Acepto los <a href="#" class="neon-blue underline">términos y condiciones</a></label>
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-900/20">
                Registrarme Ahora
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-slate-500">
            ¿Ya tienes cuenta? <a href="index.html" class="text-white font-bold hover:text-blue-400 transition-colors">Inicia sesión</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.min.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            FacebookAuthProvider,
            createUserWithEmailAndPassword,
            sendEmailVerification 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.min.js";

        // CONFIGURACIÓN DE FIREBASE (REEMPLAZA CON TUS DATOS)
        const firebaseConfig = {
  apiKey: "AIzaSyAtWCkDlZuv11AueTW6WEPNwAn97Vf-3yQ",
  authDomain: "pentatlon-scores.firebaseapp.com",
  projectId: "pentatlon-scores",
  storageBucket: "pentatlon-scores.firebasestorage.app",
  messagingSenderId: "650229123946",
  appId: "1:650229123946:web:a3769c31f8ce1a23edb313"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const loader = document.getElementById('loadingOverlay');

        // Inicializar iconos
        lucide.createIcons();

        // --- Google Login ---
        window.loginWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            loader.style.display = 'flex';
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "index.html"; 
            } catch (error) {
                alert("Error con Google: " + error.message);
            } finally {
                loader.style.display = 'none';
            }
        };

        // --- Facebook Login ---
        window.loginWithFacebook = async () => {
            const provider = new FacebookAuthProvider();
            loader.style.display = 'flex';
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (error) {
                alert("Error con Facebook: " + error.message);
            } finally {
                loader.style.display = 'none';
            }
        };

        // --- Registro por Email ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loader.style.display = 'flex';
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // Enviar correo de verificación
                await sendEmailVerification(userCredential.user);
                
                alert("¡Registro exitoso! Por seguridad, hemos enviado un enlace de verificación a tu correo.");
                window.location.href = "index.html";
            } catch (error) {
                alert("Error en registro: " + error.message);
            } finally {
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
